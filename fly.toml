# Fly.io config for APOCALYPSE. Deploy:
#   fly launch --copy-config --name apocalypse --no-deploy
#   fly secrets set OPENROUTER_API_KEY=sk-or-v1-...
#   fly deploy
app = "apocalypse-router"
primary_region = "sjc"

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "8088"
  MAR_DB = "/data/saas.db"

[mounts]
  source = "mar_data"
  destination = "/data"

[http_service]
  internal_port = 8088
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
